name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # These are HACS *default-store inclusion* checks, not requirements for
          # installing via a custom repository (how this integration is used).
          # Drop this ignore list (and add a description, topics, and brand assets)
          # only if you ever submit to the HACS default store.
          ignore: "brands topics description"
